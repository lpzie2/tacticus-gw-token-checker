<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild War Token Checker</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="favicon-32.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
    <link rel="apple-touch-icon" href="favicon-180.png">
</head>
<body>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <div class="container">
        <h1>⚔️ Tacticus Guild War Token Checker</h1>
        
        <div class="upload-section">
            <div class="file-input-wrapper">
                <input type="file" id="jsonFile" accept=".json">
                <label for="jsonFile"       class="file-input-label">📁 Analyze Guild War JSON File</label>
                
                <div class="button-container">
                    <button id="helpButton" class="help-button">❓</button>
                    <button id="legendButton" class="help-button">📖</button>
                    <button id="demoButton" class="help-button">🧪 Demo</button>
                </div>
            </div>
            <span class="file-name" id="fileName">No file selected</span>
        </div>

        <!-- help overlay -->
        <div id="helpOverlay" class="help-overlay">
            <div class="help-content">
                <button id="closeHelp" class="close-help">✕</button>
                <img src="how-to-get-data.png" alt="How to get guild war data" class="help-image">
            </div>
        </div>

        <!-- legends overlay -->
        <div id="legendOverlay" class="help-overlay">
            <div class="help-content" style="max-width:600px; color:#fcfcfc; max-height:85vh; overflow-y:auto;">
                <button class="close-help" id="closeLegend">✕</button>
                <h2 style="text-align:center; margin-bottom:16px;">Legend</h2>
                <div id="legendContent"></div>
            </div>
        </div>

        <!-- ranking overlay -->
        <div id="rankingOverlay" class="help-overlay">
            <div class="help-content" style="max-width:900px; color:#fcfcfc; max-height:85vh; overflow-y:auto;">
                <button class="close-help" id="closeRanking">✕</button>
                <div id="rankingContent"></div>
            </div>
        </div>

        <!-- failed hits overlay -->
        <div id="failedHitsOverlay" class="help-overlay">
            <div class="help-content" style="max-width:900px; color:#fcfcfc; max-height:85vh; overflow-y:auto;">
                <button class="close-help" id="closeFailedHits">✕</button>
                <div id="failedHitsContent"></div>
            </div>
        </div>

        <!-- top battles overlay -->
        <div id="topBattlesOverlay" class="help-overlay">
            <div class="help-content" style="max-width:900px; color:#fcfcfc; max-height:85vh; overflow-y:auto;">
                <button class="close-help" id="closeTopBattles">✕</button>
                <div id="topBattlesContent"></div>
            </div>
        </div>

        <!-- map overlay -->
        <div id="mapOverlay" class="help-overlay">
            <div id="mapOverlayContent" style="position:relative; max-width:90vw; max-height:90vh; background:#1a1a2e; border-radius:8px; padding:16px;">
                <button class="close-help" id="closeMap">✕</button>
                <div id="mapCaption" style="text-align:center; color:#aaa; font-size:12px; margin-bottom:8px;"></div>
                <div id="mapImageContainer" style="position:relative; display:inline-block;">
                    <img id="mapImage" style="max-width:85vw; max-height:80vh; display:block; border-radius:6px;">
                    <div id="mapSpawnIcons" style="position:absolute; top:0; left:0; width:100%; height:100%;"></div>
                </div>
            </div>
            <!-- calibration fn -->
            <br>
            <div id="mapCaption" style="text-align:center; color:#aaa; font-size:12px; margin-bottom:8px;"></div>
            <div style="text-align:center; margin-bottom:8px;">
                <button id="mapCalibrateBtn"
                    style="background:#3a3a4e; border:1px solid #555; border-radius:4px; color:white; font-size:11px; padding:3px 8px; cursor:pointer;">
                    📍 Calibrate
                </button>
                <span id="mapCalibrateOutput" style="font-size:11px; color:#4cec86; margin-left:10px; font-family:'Courier New', monospace;"></span>
            </div>
        </div>

        <!-- war map panel -->
        <div id="warMapPanel" class="war-map-panel">
            <div class="war-map-header" id="warMapToggle">
                <span id="warMapTitle" style="font-size:1.5rem; font-weight:700; color:#f0f6fc; flex:1; text-align:center;">🏛️ War Map Overview</span>
                <div style="display:flex; gap:8px; align-items:center;">
                    <span id="warMapCollapseArrow" style="font-size:14px; color:#aaa; transition:transform 0.2s;">▶</span>
                </div>
            </div>
            <div id="warMapBody" style="display:none;">
                <div id="warMapContextLabel" style="text-align:center; font-size:12px; color:#aaa; margin-bottom:12px;"></div>

                <!-- action buttons row -->
                <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:14px;">
                    <button id="wmNameBtn"      class="wm-btn">🏷️ In-Game Names</button>
                    <button id="wmSwapBtn"      class="wm-btn wm-btn-swap">↔️ Swap Tiles</button>
                    <button id="wmCaptureBtn"   class="wm-btn">📸 Capture Grid</button>
                </div>

                <!-- swap instruction banner (hidden until swap mode) -->
                <div id="wmSwapBanner" style="display:none; text-align:center; color:#fbbf24; font-size:13px; margin-top:10px;">
                    Tap two tiles to swap them. Tap ↔️ again to cancel.
                </div>

                <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:8px;">
                    <button id="wmExportBtn" class="wm-btn">📤 Export Layout</button>
                    <div id="wmExportRow" style="display:none; align-items:center; gap:6px;">
                        <input id="wmExportOutput" type="text" readonly
                            style="background:#2a2a3e; border:1px solid #555; border-radius:4px; color:#4cec86; padding:6px 10px; font-size:13px; width:260px; max-width:60vw;">
                        <button id="wmExportCopy" class="wm-btn">📋 Copy</button>
                    </div>
                </div>

                <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:14px;">
                    <button id="wmImportBtn" class="wm-btn">📥 Import Layout</button>
                    <div id="wmImportRow" style="display:none; align-items:center; gap:6px;">
                        <input id="wmImportInput" type="text" placeholder="Paste layout code…"
                            style="background:#2a2a3e; border:1px solid #555; border-radius:4px; color:white; padding:6px 10px; font-size:13px; width:260px; max-width:60vw;">
                        <button id="wmImportConfirm" class="wm-btn">✅ Load</button>
                    </div>
                </div>

                <!-- image view selector -->
                <div style="display:flex; gap:6px; justify-content:center; margin-bottom:16px;">
                    <span style="font-size:12px; color:#aaa; align-self:center;">View:</span>
                    <button class="wm-view-btn active"  data-view="tile"            >Tiles (no images yet)</button>
                    <button class="wm-view-btn"         data-view="original"        >Maps</button>
                    <button class="wm-view-btn"         data-view="only_spawns"     >Maps w/ Spawns</button>
                    <button class="wm-view-btn"         data-view="grid_n_spawns"   >Maps w/ Spawns + Grid</button>
                </div>

                <!-- battlefield selector -->
                <div style="display:flex; gap:6px; justify-content:center; margin-bottom:16px;" id="wmBattlefieldBtns">
                    <span style="font-size:12px; color:#aaa; align-self:center;">Battlefield:</span>
                    <button class="wm-bf-btn active"    data-bf="1">1</button>
                    <button class="wm-bf-btn"           data-bf="2">2</button>
                    <button class="wm-bf-btn"           data-bf="3">3</button>
                    <button class="wm-bf-btn"           data-bf="4">4</button>
                    <button class="wm-bf-btn"           data-bf="5">5</button>
                </div>

                <!-- 3x5 tile grid -->
                <div id="wmGrid" class="wm-grid"></div>
            </div>
        </div>

        <div class="stats-section" id="statsSection" style="display: none;">
            <h2 style="margin-bottom: 20px; color: #e0e0e0; text-align: center;">📊 Statistics</h2>
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <div id="content" style="display: none;">
            <div class="guild-column unassigned" style="margin-bottom: 20px;">
                <div class="guild-header">Unassigned Players</div>
                <div class="player-list" id="unassignedPlayers"></div>
            </div>
            <div class="guilds-container">
                <div class="guild-column guild-1" data-guild="1">
                    <div class="guild-header">
                        <span id="guild1Name">Guild 1</span>
                        <div id="guild1SortButtons" style="display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; justify-content:center;"></div>
                    </div>
                    <div class="player-list" id="guild1Players"></div>
                </div>

                <div class="guild-column guild-2" data-guild="2">
                    <div class="guild-header">
                        <span id="guild2Name">Guild 2</span>
                        <div id="guild2SortButtons" style="display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; justify-content:center;"></div>
                    </div>
                    <div class="player-list" id="guild2Players"></div>
                </div>
            </div>

        </div>
    </div>

    <div style="text-align:center; padding:20px; margin-top:20px; border-top:1px solid #515e7a; color:#555; font-size:14px; font-family:'Segoe UI', sans-serif;">
        <span style="color:#ffffff;">Version 1.5.1</span>
        <span style="margin:0 10px;">·</span>
        <span style="color:#ee3636;">Last Guild War Mapped: <span style="color:#ffffff;">25.2</span></span>
        <span style="margin:0 10px;">·</span>
        <a href="https://discord.gg/7p6RFafeD8" target="_blank" style="color:#61a5e4; text-decoration:none;">Discord</a>
        <span style="margin:0 10px;">·</span>
        <span style="color:#ffffff;">Tacticus Code: <span style="color:#e0cd1b; cursor:pointer;" onclick="navigator.clipboard.writeText('PEW-05-NOW')" title="Click to copy">PEW-05-NOW</span></span>
    </div>

    <script src="js/demo.js"></script>
    <script src="js/config.js"></script>
    <script src="js/config_gw_team_names.js"></script>
    <script src="js/config_gw_tile_rarities.js"></script>
    <script src="js/config_gw_tile_mappings.js"></script>
    <script src="js/data.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/html2canvas.min.js"></script>
    <script src="js/warmap.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
